<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F19"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0"/>
      <stop offset="50%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#fff" stroke-width="1">
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
  </g>

  <!-- Top-right glow -->
  <circle cx="1050" cy="120" r="200" fill="#2563EB" opacity="0.06"/>
  <!-- Bottom-left glow -->
  <circle cx="150" cy="510" r="180" fill="#10B981" opacity="0.05"/>

  <!-- AC Logo mark -->
  <text x="100" y="160" font-family="Inter,system-ui,sans-serif" font-weight="800" font-size="60" fill="url(#grad)">AC</text>

  <!-- Divider line -->
  <line x1="100" y1="200" x2="400" y2="200" stroke="url(#lineGrad)" stroke-width="2"/>

  <!-- Name -->
  <text x="100" y="300" font-family="Inter,system-ui,sans-serif" font-weight="800" font-size="72" fill="#FFFFFF">Alejandro Cruz</text>

  <!-- Role -->
  <text x="100" y="360" font-family="Inter,system-ui,sans-serif" font-weight="500" font-size="32" fill="url(#grad)">Full Stack Developer · Product Builder</text>

  <!-- Description -->
  <text x="100" y="420" font-family="Inter,system-ui,sans-serif" font-weight="400" font-size="22" fill="#94A3B8">Plataformas SaaS escalables con Vue, Node y arquitectura cloud</text>

  <!-- Projects tags -->
  <g transform="translate(100, 470)">
    <rect x="0" y="0" width="120" height="38" rx="8" fill="#2563EB" opacity="0.15"/>
    <text x="60" y="25" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-weight="600" font-size="16" fill="#60A5FA">Musion</text>

    <rect x="140" y="0" width="160" height="38" rx="8" fill="#2563EB" opacity="0.15"/>
    <text x="220" y="25" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-weight="600" font-size="16" fill="#60A5FA">Confecdotario</text>

    <rect x="320" y="0" width="140" height="38" rx="8" fill="#2563EB" opacity="0.15"/>
    <text x="390" y="25" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-weight="600" font-size="16" fill="#60A5FA">MoviBase</text>
  </g>

  <!-- URL -->
  <text x="100" y="570" font-family="'Fira Code',monospace" font-weight="400" font-size="18" fill="#475569">hdev07.devifly.dev</text>

  <!-- Bottom gradient border -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#grad)"/>
</svg>
