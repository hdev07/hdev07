<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F19"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#E5E7EB" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="0" x2="1200" y2="0"/><line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="360" x2="1200" y2="360"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="480" x2="1200" y2="480"/><line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
  </g>
  <!-- Glow orbs -->
  <circle cx="200" cy="500" r="200" fill="#2563EB" opacity="0.06"/>
  <circle cx="1000" cy="150" r="250" fill="#10B981" opacity="0.05"/>
  <!-- AC Logo -->
  <text x="600" y="240" text-anchor="middle" font-family="Inter,system-ui,-apple-system,sans-serif" font-weight="800" font-size="120" fill="url(#accent)" filter="url(#glow)">AC</text>
  <circle cx="680" cy="225" r="10" fill="#2563EB" filter="url(#glow)"/>
  <!-- Name -->
  <text x="600" y="340" text-anchor="middle" font-family="Inter,system-ui,-apple-system,sans-serif" font-weight="700" font-size="48" fill="#E5E7EB">Alejandro Cruz</text>
  <!-- Tagline -->
  <text x="600" y="400" text-anchor="middle" font-family="Inter,system-ui,-apple-system,sans-serif" font-weight="400" font-size="28" fill="#9CA3AF">Full Stack Developer · Product Builder</text>
  <!-- Bottom line -->
  <rect x="450" y="460" width="300" height="3" rx="2" fill="url(#accent)" opacity="0.6"/>
  <!-- URL -->
  <text x="600" y="520" text-anchor="middle" font-family="Fira Code,monospace" font-weight="400" font-size="22" fill="#38BDF8" opacity="0.7">hdev07.vercel.app</text>
  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>
</svg>
